name: ADAS Unified Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Test and Build Backend (Node.js)
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install & Test
        run: |
          cd backend
          npm ci
          npm test --if-present

  # 2. Test and Build Frontend (Vite)
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  # 3. Test ML Engine (Python & R)
  test-ml-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          cd ml-engine
          pip install -r requirements.txt
      - name: Lint Python (Optional)
        run: |
          pip install flake8
          flake8 ml-engine/*.py --count --select=E9,F63,F7,F82 --show-source --statistics

  # 4. Final Container Check
  # This only runs if the first three jobs pass
  docker-build-check:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ml-engine]
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Compose Build
        run: docker compose build