version: '3.8'
services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-engine:
    build: ./ml-engine
    ports:
      - "5001:5001"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/adas_db
      # Pass the ML engine's internal Docker network URL
      - ML_SERVICE_URL=http://ml-engine:5001
    depends_on:
      - mongo
      - ml-engine

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data: